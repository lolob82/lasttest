AWSTemplateFormatVersion: '2010-09-09'
Description: 'NatureMama Heritage E-commerce Backend - DynamoDB, Lambda, API Gateway, and SES'

Parameters:
  FromEmailAddress:
    Type: String
    Default: orders@naturemamaheritage.com
    Description: Email address to send order confirmations from (must be verified in SES)

Resources:
  # DynamoDB Table for Orders
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: NatureMamaOrders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderNumber
          AttributeType: S
      KeySchema:
        - AttributeName: orderNumber
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # IAM Role for Lambda Function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NatureMamaLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: !GetAtt OrdersTable.Arn
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'

  # Lambda Function for Order Processing
  OrderProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: NatureMamaOrderProcessor
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref OrdersTable
          FROM_EMAIL: !Ref FromEmailAddress
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const dynamodb = new AWS.DynamoDB.DocumentClient();
          const ses = new AWS.SES();

          const corsHeaders = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Access-Control-Allow-Methods': 'OPTIONS,POST,GET'
          };

          const generateEmailHTML = (orderData) => {
            const itemsHTML = orderData.items.map(item => `
              <tr style="border-bottom: 1px solid #f0f0f0;">
                <td style="padding: 15px; text-align: left;">
                  <strong style="color: #7a8471;">${item.name}</strong><br>
                  <span style="color: #8b7355; font-size: 14px;">${item.subtitle}</span>
                </td>
                <td style="padding: 15px; text-align: center;">${item.quantity}</td>
                <td style="padding: 15px; text-align: right;">€${item.price}</td>
                <td style="padding: 15px; text-align: right; font-weight: bold;">€${item.total}</td>
              </tr>
            `).join('');

            return `
              <!DOCTYPE html>
              <html>
              <head>
                <meta charset="utf-8">
                <title>Order Confirmation - NatureMama Heritage</title>
              </head>
              <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; line-height: 1.6; color: #2c2c2c; margin: 0; padding: 0; background-color: #fafafa;">
                <div style="max-width: 600px; margin: 0 auto; background-color: white; box-shadow: 0 0 20px rgba(0,0,0,0.1);">
                  
                  <!-- Header -->
                  <div style="background: linear-gradient(135deg, #9caf88 0%, #7a8471 100%); color: white; padding: 40px 30px; text-align: center;">
                    <h1 style="margin: 0; font-size: 28px;">NatureMama Heritage</h1>
                    <p style="margin: 10px 0 0 0; opacity: 0.9; font-size: 16px;">The power of nature for your well-being</p>
                  </div>

                  <!-- Order Confirmation -->
                  <div style="padding: 30px;">
                    <h2 style="color: #7a8471; margin-bottom: 20px;">Order Confirmation</h2>
                    <p style="font-size: 16px; margin-bottom: 20px;">Dear ${orderData.customerInfo.fullName},</p>
                    <p style="margin-bottom: 20px;">Thank you for your order! We're excited to share the power of nature with you.</p>
                    
                    <div style="background-color: #f8f6f3; padding: 20px; border-radius: 10px; margin-bottom: 30px;">
                      <h3 style="color: #7a8471; margin-top: 0;">Order Details</h3>
                      <p><strong>Order Number:</strong> ${orderData.orderNumber}</p>
                      <p><strong>Order Date:</strong> ${new Date(orderData.orderDate).toLocaleDateString('en-US', { 
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric' 
                      })}</p>
                    </div>

                    <!-- Order Items -->
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
                      <thead>
                        <tr style="background-color: #7a8471; color: white;">
                          <th style="padding: 15px; text-align: left;">Product</th>
                          <th style="padding: 15px; text-align: center;">Qty</th>
                          <th style="padding: 15px; text-align: right;">Price</th>
                          <th style="padding: 15px; text-align: right;">Total</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${itemsHTML}
                      </tbody>
                    </table>

                    <!-- Order Summary -->
                    <div style="background-color: #f8f6f3; padding: 20px; border-radius: 10px; margin-bottom: 30px;">
                      <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>Subtotal:</span>
                        <span>€${orderData.subtotal}</span>
                      </div>
                      <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>Shipping:</span>
                        <span>${orderData.shipping === '0.00' ? 'Free' : '€' + orderData.shipping}</span>
                      </div>
                      <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; color: #7a8471; border-top: 1px solid #ddd; padding-top: 10px;">
                        <span>Total:</span>
                        <span>€${orderData.total}</span>
                      </div>
                    </div>

                    <!-- Shipping Address -->
                    <div style="background-color: #f8f6f3; padding: 20px; border-radius: 10px; margin-bottom: 30px;">
                      <h3 style="color: #7a8471; margin-top: 0;">Shipping Address</h3>
                      <p style="margin: 5px 0;">${orderData.customerInfo.fullName}</p>
                      <p style="margin: 5px 0;">${orderData.customerInfo.address}</p>
                      <p style="margin: 5px 0;">${orderData.customerInfo.postalCode} ${orderData.customerInfo.city}</p>
                      <p style="margin: 5px 0;">${orderData.customerInfo.country}</p>
                      <p style="margin: 5px 0;">📞 ${orderData.customerInfo.phoneNumber}</p>
                    </div>

                    <p style="margin-bottom: 20px;">Your order will be processed within 1-2 business days. You'll receive a shipping confirmation with tracking information once your order is on its way.</p>
                    
                    <div style="text-align: center; margin: 30px 0;">
                      <p style="color: #8b7355; font-style: italic;">"Born in the French Alps • Natural Excellence Since 2023"</p>
                    </div>
                  </div>

                  <!-- Footer -->
                  <div style="background-color: #7a8471; color: white; padding: 30px; text-align: center;">
                    <p style="margin: 0 0 10px 0;">Thank you for choosing NatureMama Heritage</p>
                    <p style="margin: 0; opacity: 0.8; font-size: 14px;">🌿 European Organic Certified • 🏢 Mission-Driven Company</p>
                  </div>
                </div>
              </body>
              </html>
            `;
          };

          exports.handler = async (event) => {
            console.log('Event:', JSON.stringify(event, null, 2));

            // Handle CORS preflight
            if (event.httpMethod === 'OPTIONS') {
              return {
                statusCode: 200,
                headers: corsHeaders,
                body: ''
              };
            }

            try {
              if (event.httpMethod === 'POST' && event.path === '/orders') {
                // Create new order
                const orderData = JSON.parse(event.body);
                
                // Store order in DynamoDB
                const params = {
                  TableName: process.env.DYNAMODB_TABLE_NAME,
                  Item: {
                    orderNumber: orderData.orderNumber,
                    customerInfo: orderData.customerInfo,
                    items: orderData.items,
                    subtotal: orderData.subtotal,
                    shipping: orderData.shipping,
                    total: orderData.total,
                    orderDate: orderData.orderDate,
                    status: 'confirmed'
                  }
                };

                await dynamodb.put(params).promise();

                // Send confirmation email
                const emailHTML = generateEmailHTML(orderData);
                
                const emailParams = {
                  Source: process.env.FROM_EMAIL,
                  Destination: {
                    ToAddresses: [orderData.customerInfo.email]
                  },
                  Message: {
                    Subject: {
                      Data: `Order Confirmation - ${orderData.orderNumber} - NatureMama Heritage`
                    },
                    Body: {
                      Html: {
                        Data: emailHTML
                      }
                    }
                  }
                };

                await ses.sendEmail(emailParams).promise();

                return {
                  statusCode: 200,
                  headers: corsHeaders,
                  body: JSON.stringify({
                    success: true,
                    orderNumber: orderData.orderNumber,
                    message: 'Order placed successfully'
                  })
                };

              } else if (event.httpMethod === 'GET' && event.path === '/orders') {
                // List all orders (for admin)
                const params = {
                  TableName: process.env.DYNAMODB_TABLE_NAME
                };

                const result = await dynamodb.scan(params).promise();

                return {
                  statusCode: 200,
                  headers: corsHeaders,
                  body: JSON.stringify({
                    success: true,
                    orders: result.Items
                  })
                };

              } else {
                return {
                  statusCode: 404,
                  headers: corsHeaders,
                  body: JSON.stringify({ error: 'Not found' })
                };
              }

            } catch (error) {
              console.error('Error:', error);
              return {
                statusCode: 500,
                headers: corsHeaders,
                body: JSON.stringify({
                  success: false,
                  error: error.message
                })
              };
            }
          };

  # API Gateway
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: NatureMamaAPI
      Description: API for NatureMama Heritage e-commerce
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource
  OrdersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: orders

  # OPTIONS Method for CORS
  OrdersOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref OrdersResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # POST Method for Orders
  OrdersPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref OrdersResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${OrderProcessorFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200

  # GET Method for Orders
  OrdersGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref OrdersResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${OrderProcessorFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - OrdersPostMethod
      - OrdersGetMethod
      - OrdersOptionsMethod
    Properties:
      RestApiId: !Ref ApiGateway
      StageName: prod

  # Lambda Permission for API Gateway
  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrderProcessorFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:us-east-1:${AWS::AccountId}:${ApiGateway}/*/POST/orders'

  # Lambda Permission for API Gateway GET
  LambdaApiGatewayPermissionGet:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrderProcessorFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:us-east-1:${AWS::AccountId}:${ApiGateway}/*/GET/orders'

Outputs:
  ApiGatewayUrl:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${ApiGateway}.execute-api.us-east-1.amazonaws.com/prod'
    Export:
      Name: NatureMamaApiUrl

  DynamoDBTableName:
    Description: 'DynamoDB table name for orders'
    Value: !Ref OrdersTable
    Export:
      Name: NatureMamaOrdersTable

  LambdaFunctionName:
    Description: 'Lambda function name'
    Value: !Ref OrderProcessorFunction
    Export:
      Name: NatureMamaLambdaFunction